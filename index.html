<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday My🎂</title>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&display=swap");

    :root{
      --pink1:#ff4d6d;
      --pink2:#ff8fab;
      --pink3:#ffc6ff;
      --purple:#b5179e;
      --blue:#4cc9f0;
      --yellow:#ffd166;
      --cyan:#06d6a0;
      --cakeBase:#ff6fa8;
      --cakeCream:#fff5f8;
      --cakePlate:#fff2f8;
      --sprinkle1:#ff4d6d;
      --sprinkle2:#ffd166;
      --sprinkle3:#4cc9f0;
      --sprinkle4:#b5179e;
      --sprinkle5:#06d6a0;
      --sprinkle6:#c77dff;
      --glass: rgba(255,255,255,0.2);
      --glass-border: rgba(255,255,255,0.4);
      --shadow: 0 24px 60px rgba(0,0,0,0.3);
      --glow: 0 0 40px rgba(255,77,109,0.5);
    }

    *{ margin:0; padding:0; box-sizing:border-box; }

    html, body{
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:"Poppins", sans-serif;
    }

    body{
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      background: linear-gradient(120deg, var(--pink1), var(--pink2), var(--blue), var(--purple));
      background-size: 400% 400%;
      animation: gradientMove 10s ease infinite;
      position:relative;
    }

    @keyframes gradientMove{
      0%{ background-position:0% 50%; }
      50%{ background-position:100% 50%; }
      100%{ background-position:0% 50%; }
    }

    body::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.35), transparent 60%),
        radial-gradient(circle at bottom, rgba(0,0,0,0.25), transparent 60%);
      pointer-events:none;
    }

    /* blobs */
    .blob{
      position:absolute;
      width:280px;
      height:280px;
      border-radius:50%;
      filter: blur(40px);
      opacity:0.55;
      z-index:0;
      animation: float 8s ease-in-out infinite;
    }
    .blob.one{ background: rgba(255,255,255,0.55); top:-80px; left:-60px; }
    .blob.two{ background: rgba(255,77,109,0.55); bottom:-120px; right:-80px; animation-delay:1.5s; }
    .blob.three{ background: rgba(76,201,240,0.55); top:40%; right:10%; width:200px; height:200px; animation-delay:3s; }

    @keyframes float{
      0%,100%{ transform: translateY(0px) scale(1); }
      50%{ transform: translateY(-35px) scale(1.05); }
    }

    /* Stars background */
    .star{
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0;
      z-index: 0;
      animation: twinkle var(--duration) ease-in-out infinite;
    }

    @keyframes twinkle{
      0%,100%{ opacity:0.3; transform: scale(0.8); }
      50%{ opacity:1; transform: scale(1.2); }
    }

    /* Balloons */
    .balloon{
      position:absolute;
      z-index:1;
      opacity: 0.85;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,0.25));
      animation: balloonFloat 12s ease-in-out infinite;
    }
    .balloon:nth-child(odd){ animation-direction: reverse; animation-duration: 14s; }
    .balloon:nth-child(3n){ animation-duration: 11s; }

    @keyframes balloonFloat{
      0%,100%{ transform: translateY(0) rotate(-3deg); }
      50%{ transform: translateY(-30px) rotate(3deg); }
    }

    /* Confetti */
    #confetti-container{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:9999;
    }

    /* Hearts container */
    #hearts-container{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:9998;
    }

    /* Music Button */
    .music-btn{
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 10000;
      padding: 12px 20px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: white;
      background: rgba(255,255,255,0.18);
      border: 2px solid rgba(255,255,255,0.45);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      box-shadow: 0 14px 35px rgba(0,0,0,0.35), 0 0 40px rgba(255,77,109,0.2);
      transition: all 0.3s ease;
      animation: buttonGlow 3s ease-in-out infinite;
    }
    @keyframes buttonGlow{
      0%,100%{ box-shadow: 0 14px 35px rgba(0,0,0,0.35), 0 0 20px rgba(255,77,109,0.2); }
      50%{ box-shadow: 0 14px 35px rgba(0,0,0,0.35), 0 0 45px rgba(255,77,109,0.45); }
    }
    .music-btn:hover{
      transform: translateY(-4px) scale(1.08);
      border-color: rgba(255,255,255,0.7);
      box-shadow: 0 20px 45px rgba(0,0,0,0.4), 0 0 60px rgba(255,77,109,0.5);
    }
    .music-btn.playing{
      background: linear-gradient(135deg, rgba(255,77,109,0.35) 0%, rgba(181,23,158,0.35) 100%);
      border-color: rgba(255,77,109,0.7);
    }
    .music-btn.playing:hover{
      box-shadow: 0 20px 45px rgba(0,0,0,0.4), 0 0 70px rgba(255,77,109,0.65);
    }

    /* Cake */
    #cakeWrap{
      position:relative;
      z-index:2;
      width:min(560px, 94vw);
      height:auto;
      margin-top:-60px;
      padding:24px 18px 18px;
      border-radius:44px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.35);
      -webkit-backdrop-filter: blur(18px);
      backdrop-filter: blur(18px);
      box-shadow: 0 30px 80px rgba(0,0,0,0.24), 0 0 60px rgba(255,150,189,0.18);
      overflow:hidden;
      animation: cakeEntrance 1.4s cubic-bezier(0.22, 1.08, 0.58, 1) forwards, subtleFloat 4s ease-in-out 1.4s infinite;
      border: 2px solid rgba(255,255,255,0.5);
    }

    #cakeWrap::before{
      content:"";
      position:absolute;
      inset:0;
      background: radial-gradient(circle at 50% 18%, rgba(255,255,255,0.35), transparent 45%);
      pointer-events:none;
      z-index:1;
    }

    #cakeWrap::after{
      content:"";
      position:absolute;
      left:50%;
      bottom:14px;
      width:320px;
      height:220px;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 72%);
      pointer-events:none;
      z-index:1;
    }

    @keyframes cakePop{
      0%{ transform: translateY(40px) scale(0.82); opacity:0; }
      50%{ transform: translateY(-14px) scale(1.04); }
      100%{ transform: translateY(0) scale(1); opacity:1; }
    }
    @keyframes cakeEntrance{
      0%{ transform: translateY(40px) scale(0.82); opacity:0; filter: blur(6px); }
      60%{ transform: translateY(-14px) scale(1.04); opacity:0.95; filter: blur(0); }
      100%{ transform: translateY(0) scale(1); opacity:1; filter: blur(0); }
    }
    @keyframes subtleFloat{
      0%,100%{ transform: translateY(0); }
      50%{ transform: translateY(-8px); }
    }
    @keyframes crownPulse{
      0%,100%{ filter: drop-shadow(0 0 8px rgba(255,212,59,0.7)); }
      50%{ filter: drop-shadow(0 0 18px rgba(255,212,59,0.95)); }
    }

    #cake{
      width:100%;
      height:auto;
      display:block;
      position:relative;
      z-index:2;
    }

    /* Candle group */
    .candle{
      background: linear-gradient(to bottom, #fff, #ffe6ef);
      border-radius: 18px;
      position:absolute;
      top: 95px; /* sits on cake top */
      width:14px;
      height:82px;
      transform: translateY(-220px);
      backface-visibility:hidden;
      animation: candleIn 700ms 2.2s cubic-bezier(.2,.9,.2,1) forwards;
      z-index:6;
      box-shadow: 0 14px 24px rgba(0,0,0,0.18);
      outline: 1px solid rgba(255,255,255,0.45);
      cursor:pointer;
    }

    .candle:before,
    .candle:after{
      content:"";
      position:absolute;
      left:0;
      width:100%;
      height:3px;
      border-radius:10px;
      background: rgba(255,0,70,0.35);
    }
    .candle:before{ top:20%; }
    .candle:after{ top:55%; }

    @keyframes candleIn{
      to{ transform: translateY(0); }
    }

    /* different candle positions */
    .c1{ left: 18%; }
    .c2{ left: 34%; top: 90px; height: 76px; }
    .c3{ left: 50%; top: 85px; height: 86px; }
    .c4{ left: 66%; top: 90px; height: 76px; }
    .c5{ left: 82%; }

    /* Candle hover glow halo */
    .candle::after{
      content:"";
      position:absolute;
      top:-50px;
      left:50%;
      width:50px;
      height:50px;
      transform:translateX(-50%);
      background: radial-gradient(circle, rgba(255,215,102,0.4), transparent 70%);
      filter: blur(8px);
      opacity:0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events:none;
      z-index:5;
    }
    .candle:hover::after{
      opacity:1;
      transform:translateX(-50%) scale(1.3);
    }

    /* Flame */
    .fire{
      position:absolute;
      top:-26px;
      left:50%;
      width:10px;
      height:24px;
      margin-left:-5px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff 0%, #ffd166 25%, #ff9f43 55%, #ff6b35 100%);
      transform-origin: center bottom;
      filter: blur(0.3px);
      box-shadow:
        0 0 20px rgba(255, 215, 102, 0.85),
        0 0 50px rgba(255, 107, 53, 0.7),
        0 0 90px rgba(255, 77, 109, 0.55),
        inset 0 -4px 8px rgba(255, 159, 67, 0.5);
      transition: opacity 0.4s ease, transform 0.4s ease;
      animation: flameCore 2s ease-in-out infinite;
    }

    .candle:hover .fire{
      filter: blur(0.1px);
      box-shadow:
        0 0 30px rgba(255, 215, 102, 1),
        0 0 70px rgba(255, 107, 53, 0.85),
        0 0 110px rgba(255, 77, 109, 0.65),
        inset 0 -4px 12px rgba(255, 159, 67, 0.7);
    }

    @keyframes flameCore{
      0%,100%{ transform: translateY(0) scale(1) rotate(-2deg); }
      25%{ transform: translateY(-4px) scale(1.1) rotate(2deg); }
      50%{ transform: translateY(-18px) scale(0.85) rotate(-3deg); }
      75%{ transform: translateY(-3px) scale(1.05) rotate(2deg); }
    }

    /* flame animation - layered flames for depth */
    .fire:nth-child(1){ animation: flame1 1.8s 2.5s ease-in-out infinite; filter: blur(0.3px); opacity: 1; }
    .fire:nth-child(2){ animation: flame2 1.6s 2.5s ease-in-out infinite; opacity: 0.9; }
    .fire:nth-child(3){ animation: flame3 1.4s 2.5s ease-in-out infinite; opacity: 0.78; }
    .fire:nth-child(4){ animation: flame4 1.2s 2.5s ease-in-out infinite; opacity: 0.62; }
    .fire:nth-child(5){ animation: flame5 1s 2.5s ease-in-out infinite; opacity: 0.48; }

    @keyframes flame1{
      0%,100%{ transform: translateY(0) scale(1) rotate(-2deg); }
      50%{ transform: translateY(-22px) scale(0.14) rotate(10deg); opacity: 0.15; }
    }
    @keyframes flame2{
      0%,100%{ transform: translateY(0) scale(0.95) rotate(2deg); }
      50%{ transform: translateY(-19px) scale(0.18) rotate(-8deg); opacity: 0.2; }
    }
    @keyframes flame3{
      0%,100%{ transform: translateY(0) scale(0.9) rotate(-3deg); }
      50%{ transform: translateY(-17px) scale(0.22) rotate(7deg); opacity: 0.25; }
    }
    @keyframes flame4{
      0%,100%{ transform: translateY(0) scale(0.85) rotate(3deg); }
      50%{ transform: translateY(-14px) scale(0.28) rotate(-5deg); opacity: 0.3; }
    }
    @keyframes flame5{
      0%,100%{ transform: translateY(0) scale(0.8) rotate(-2deg); }
      50%{ transform: translateY(-12px) scale(0.35) rotate(4deg); opacity: 0.35; }
    }

    .smoke{
      position:absolute;
      bottom: 58px;
      left: 50%;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.95), rgba(255,255,255,0.12));
      opacity: 0;
      transform: translateX(-50%) scale(0.7);
      animation: smokeRise 1.8s ease forwards;
      pointer-events:none;
      filter: blur(0.6px);
      z-index:7;
    }

    @keyframes smokeRise{
      0%{ opacity:0.8; transform: translateX(-50%) translateY(0) scale(0.7); }
      50%{ opacity:0.4; transform: translateX(-45%) translateY(-40px) scale(1.1); }
      100%{ opacity:0; transform: translateX(-40%) translateY(-95px) scale(1.5); }
    }

    .cake-sparkle{
      position:absolute;
      pointer-events:none;
      border-radius:50%;
    }

    @keyframes sparkleTwinkle{
      0%{ opacity:0; transform: scale(0.4); }
      30%{ opacity:1; transform: scale(1.2); }
      100%{ opacity:0; transform: scale(1.8); }
    }

    /* flame animation */
    .candle.blown .fire{
      opacity: 0 !important;
      transform: translateY(-10px) scale(0.2);
      animation: none !important;
    }

    /* smoke */
    .smoke{
      position:absolute;
      top:-30px;
      left:50%;
      width:10px;
      height:10px;
      margin-left:-5px;
      border-radius:50%;
      background: rgba(255,255,255,0.7);
      filter: blur(1px);
      animation: smoke 1.8s ease-out forwards;
    }

    @keyframes smoke{
      0%{ opacity:0.8; transform: translate(-50%, 0) scale(0.8); }
      100%{ opacity:0; transform: translate(-50%, -80px) scale(2.5); }
    }

    /* Crown/halo */
    .crown-halo{
      position:absolute;
      top:-60px;
      left:50%;
      transform:translateX(-50%);
      z-index:10;
    }

    @keyframes crownPulse{
      0%,100%{ filter: drop-shadow(0 0 8px rgba(255, 212, 59, 0.7)); }
      50%{ filter: drop-shadow(0 0 20px rgba(255, 212, 59, 0.95)); }
    }

    /* Stars */
    #stars-layer{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:1;
    }

    .star{
      position:absolute;
      background: white;
      border-radius:50%;
      pointer-events:none;
    }

    /* Balloons */
    #balloons-layer{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:1;
    }

    .balloon{
      position:absolute;
      opacity:0.9;
      filter: drop-shadow(6px 10px 14px rgba(0,0,0,0.25));
      pointer-events:none;
    }

    /* Text glow backdrop */
    .text{
      display: none; /* Hide initial happy birthday text */
    }

    @keyframes textIn{
      to{ opacity:1; transform: translateY(0); }
    }

    .text h1{
      font-family: "Great Vibes", cursive;
      font-size: clamp(2.4rem, 5vw, 4rem);
      font-weight: 400;
      letter-spacing: 1.5px;
      color: transparent;
      background: linear-gradient(135deg,#ffffff 0%,#ffc6ff 25%,#ff8fab 50%,#ffd166 75%,#ffffff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: none;
      position: relative;
      white-space: nowrap;
      overflow: hidden;
      border-right: 3px solid rgba(255,255,255,0.9);
      display:inline-block;
      padding-right: 6px;
      animation: textGlow 4s ease-in-out infinite;
    }
    .text h1::before{
      content:'';
      position:absolute;
      inset:-10px -15px;
      background: linear-gradient(135deg,rgba(255,77,109,0.3),rgba(255,143,171,0.2),rgba(76,201,240,0.2),transparent 65%);
      border-radius:22px;
      z-index:-1;
      filter: blur(4px);
      animation: gradfade 3s ease-in-out infinite alternate;
    }
    @keyframes textGlow{
      0%,100%{ filter: drop-shadow(0 0 18px rgba(255,77,109,0.6)) drop-shadow(0 0 35px rgba(255,143,171,0.45)) drop-shadow(0 0 60px rgba(255,209,102,0.35)); }
      50%{ filter: drop-shadow(0 0 28px rgba(255,77,109,0.85)) drop-shadow(0 0 50px rgba(255,143,171,0.6)) drop-shadow(0 0 80px rgba(255,209,102,0.5)); }
    }
    @keyframes gradfade{
      0%{ opacity:0.6; }
      100%{ opacity:1; }
    }

    .sub{
      margin-top: 12px;
      font-size: 1rem;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    /* Button capsule style */
    .gallery-btn{
      margin-top:14px;
      padding:14px 28px;
      border:none;
      border-radius:999px;
      font-size:1rem;
      font-weight:700;
      letter-spacing:0.5px;
      cursor:pointer;
      background:linear-gradient(135deg,rgba(255,255,255,0.22) 0%,rgba(255,77,109,0.25) 100%);
      border:2px solid rgba(255,255,255,0.45);
      color:white;
      -webkit-backdrop-filter:blur(10px);
      backdrop-filter:blur(10px);
      box-shadow:0 14px 35px rgba(0,0,0,0.3), 0 0 30px rgba(255,77,109,0.25);
      transition:all 0.35s ease;
      animation: buttonPulse 2.5s ease-in-out infinite;
      z-index:100;
    }
    @keyframes buttonPulse{
      0%,100%{ box-shadow:0 14px 35px rgba(0,0,0,0.3),0 0 20px rgba(255,77,109,0.25); border-color:rgba(255,255,255,0.45); }
      50%{ box-shadow:0 18px 45px rgba(0,0,0,0.35),0 0 40px rgba(255,77,109,0.4); border-color:rgba(255,255,255,0.65); }
    }
    .gallery-btn:hover{
      transform:translateY(-3px) scale(1.05);
      background:linear-gradient(135deg,rgba(255,255,255,0.3) 0%,rgba(255,77,109,0.35) 100%);
      box-shadow:0 20px 50px rgba(0,0,0,0.4),0 0 60px rgba(255,77,109,0.5);
    }

    /* Age ribbon (top) */
    .age-ribbon{
      position:fixed;
      top:18px;
      left:18px;
      z-index:10000;
      background:linear-gradient(135deg,#ff4d6d 0%,#b5179e 100%);
      padding:10px 24px;
      border-radius:999px;
      border:3px solid rgba(255,255,255,0.45);
      box-shadow:0 10px 28px rgba(0,0,0,0.35),0 0 25px rgba(255,77,109,0.5);
      color:white;
      font-weight:700;
      font-size:1.4rem;
      text-shadow:0 2px 8px rgba(0,0,0,0.4);
      animation: ribbonPop 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.3s both, ribbonFloat 3s ease-in-out 0.9s infinite;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .age-inner{
      display:flex;
      align-items:center;
      gap:8px;
    }
    .age-label{
      font-size:0.8rem;
      font-weight:400;
      opacity:0.9;
    }
    .age-number{
      font-size:1.6rem;
      text-shadow:0 0 15px rgba(255,215,102,0.8),0 0 30px rgba(255,77,109,0.6);
      animation: ageGlow 2s ease-in-out infinite;
    }
    @keyframes ageGlow{
      0%,100%{ text-shadow:0 0 15px rgba(255,215,102,0.8),0 0 30px rgba(255,77,109,0.6); }
      50%{ text-shadow:0 0 22px rgba(255,215,102,1),0 0 40px rgba(255,77,109,0.8); }
    }
    @keyframes ribbonPop{
      0%{ transform:scale(0.5) rotate(-12deg); opacity:0; }
      60%{ transform:scale(1.08) rotate(3deg); }
      100%{ transform:scale(1) rotate(0deg); opacity:1; }
    }
    @keyframes ribbonFloat{
      0%,100%{ transform: translateY(0); }
      50%{ transform: translateY(-6px); }
    }
    .ribbon-tail{
      position:absolute;
      width:0; height:0;
      border-style:solid;
    }
    .age-ribbon .left{
      left:-8px; top:50%;
      border-width:8px 10px 8px 0;
      border-color:transparent #b5179e transparent transparent;
      transform-origin:left; transform:scaleX(0.7);
    }
    .age-ribbon .right{
      right:-8px; top:50%;
      border-width:8px 0 8px 10px;
      border-color:transparent transparent transparent #ff4d6d;
      transform-origin:right; transform:scaleX(0.7);
    }

    /* Enhanced heading text */
    .enhance-text{
      background: linear-gradient(135deg, #ffffff 0%, #ffe5ee 15%, #ff8fab 35%, #ff6fa8 55%, #ffd166 75%, #ffffff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      position: relative;
      text-shadow: none;
      animation: textShimmer 3s ease-in-out infinite, textFloat 4s ease-in-out infinite;
    }
    .enhance-text::before{
      content:'';
      position:absolute;
      inset:-12px -18px;
      background: linear-gradient(135deg,
        rgba(255,77,109,0.25),
        rgba(255,143,171,0.15),
        rgba(76,201,240,0.15),
        rgba(255,209,102,0.12),
        transparent 70%);
      border-radius:26px;
      z-index:-1;
      filter: blur(6px);
    }
    .enhance-text::after{
      content:'';
      position:absolute;
      inset:0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      background-size: 200% 100%;
      animation: shine 3s linear infinite;
      -webkit-background-clip: text;
      background-clip: text;
      pointer-events: none;
      z-index:1;
    }

    @keyframes textShimmer{
      0%,100%{ filter: brightness(1) drop-shadow(0 0 20px rgba(255,77,109,0.55)); }
      50%{ filter: brightness(1.15) drop-shadow(0 0 35px rgba(255,77,109,0.75)); }
    }
    @keyframes textFloat{
      0%,100%{ transform: translateY(0); }
      50%{ transform: translateY(-5px); }
    }
    @keyframes shine{
      0%{ background-position: -100% 0; }
      20%{ background-position: 100% 0; }
      100%{ background-position: 100% 0; }
    }

    .name{
      font-size:1.1em;
      display:block;
      text-align:center;
      margin-top:8px;
      color:white !important;
      text-shadow:0 0 25px rgba(255,255,255,0.6),0 0 50px rgba(255,77,109,0.5);
    }

    /* Background confetti (distant) */
    #confetti-bg{
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      pointer-events:none;
      z-index:0;
    }
    .confetti-bg-piece{
      position:absolute;
      top:-10px;
      width:8px; height:8px;
      opacity:0.5;
    }

    .celebration-overlay{
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      pointer-events: none;
      opacity: 1;
      z-index: 10005;
    }

    .drop-image-row{
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 16px;
      width: min(94vw, 720px);
      pointer-events: none;
      flex-wrap: wrap;
    }

    .drop-image{
      width: min(200px, 28vw);
      max-width: 220px;
      border-radius: 24px;
      border: 4px solid rgba(255,255,255,0.95);
      box-shadow: 0 32px 80px rgba(0,0,0,0.35), 0 0 30px rgba(255,77,109,0.25);
      background: rgba(0,0,0,0.2);
      transform: translateY(-240%);
      opacity: 0;
      animation: dropImage 1.1s cubic-bezier(0.16,1.2,0.58,1) forwards;
      backdrop-filter: blur(4px);
    }
    .drop-image:nth-child(1){ animation-delay: 0.12s; }
    .drop-image:nth-child(2){ animation-delay: 0.28s; }
    .drop-image:nth-child(3){ animation-delay: 0.44s; }

    @keyframes dropImage{
      0%{ opacity:0; transform: translateY(-240%) scale(0.85) rotate(-8deg); }
      70%{ opacity:1; transform: translateY(20px) scale(1.06) rotate(3deg); }
      85%{ transform: translateY(-6px) scale(0.98) rotate(0deg); }
      100%{ opacity:1; transform: translateY(0) scale(1); }
    }

    .final-message{
      position: relative;
      text-align: center;
      color: #fff;
      opacity: 0;
      transform: translateY(30px) scale(0.92);
      animation: popMessage 0.9s cubic-bezier(0.22,0.95,0.58,1) 1.1s forwards;
      pointer-events: none;
      width: min(90vw, 600px);
      padding: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.25) 0%, rgba(255,77,109,0.15) 100%);
      border-radius: 30px;
      border: 2px solid rgba(255,255,255,0.4);
      box-shadow: 0 30px 80px rgba(0,0,0,0.35), 0 0 80px rgba(255,77,109,0.3);
      backdrop-filter: blur(12px);
    }
    .final-message h2{
      font-family: "Great Vibes", cursive;
      font-size: clamp(3rem, 7vw, 5rem);
      margin: 0;
      line-height: 1.1;
      text-shadow: 0 0 40px rgba(255,255,255,0.4), 0 0 80px rgba(255,77,109,0.5), 0 12px 30px rgba(0,0,0,0.3);
      animation: finalPulse 2s ease-in-out 1.5s infinite;
    }
    .final-message p{
      margin: 20px auto 0;
      max-width: 580px;
      font-size: 1.1rem;
      opacity: 1;
      line-height: 1.7;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    @keyframes popMessage{
      to{ opacity:1; transform: translateY(0) scale(1); }
    }
    @keyframes finalPulse{
      0%,100%{ filter: brightness(1) drop-shadow(0 0 20px rgba(255,255,255,0.4)); }
      50%{ filter: brightness(1.1) drop-shadow(0 0 35px rgba(255,255,255,0.6)); }
    }

    .pop-dot{
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      opacity: 0;
      pointer-events: none;
      animation: popDot 0.9s ease forwards;
    }

    @keyframes popMessage{
      to{ opacity:1; transform: translateY(0) scale(1); }
    }

    @keyframes popDot{
      0%{ opacity:1; transform: translate(0,0) scale(1); }
      100%{ opacity:0; transform: translate(var(--dx), var(--dy)) scale(0.25); }
    }

    /* typewriter */
    .typewriter{
      width:0;
      animation:
        typing 2.3s steps(28, end) forwards,
        blink .7s infinite;
    }

    @keyframes typing{
      from{ width:0; }
      to{ width:100%; }
    }

    @keyframes blink{
      50%{ border-color: transparent; }
    }

    @media (max-width: 480px){
      #cakeWrap{ margin-top: -30px; }
      .text{ width: 92vw; padding: 14px 16px; }
      .candle{ top: 92px; height: 70px; }
    }
  </style>
</head>

<body>

      <circle cx="440" cy="240" r="8" fill="#06d6a0"/>

  <!-- Age counter ribbon -->
  <div class="age-ribbon">

  <div class="text">
    <h1 class="typewriter enhance-text">Happy Birthday <br><span class="name">Sushmaaa🐼</span></h1>
    <p class="sub">Click any candle to blow it 💨 (press B to blow all) • View Photos 📸</p>
  </div>

  <!-- Gallery Button -->
  <button id="galleryBtn" class="gallery-btn" title="Open Gallery">
    📷 Photos
  </button>

  <audio id="bgMusic" src="./music.mp3" loop></audio>

  <script>
    window.addEventListener("load", () => {
      createStars();
      createBalloons();
      startFloatingHearts();
      startCakeSparkles();

      // Removed initial confetti start to fix stuck confetti above cake

      setupMusic();
      setupBlowEffect();
    });

    let finalCelebrationShown = false;

    // Wind ripple effect on blow
    function createWindRipple(x, y) {
      const ripple = document.createElement('div');
      ripple.style.cssText = `
        position: absolute;
        left: ${x}px;
        top: ${y}px;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255,255,255,0.6);
        border-radius: 50%;
        transform: translate(-50%, -50%) scale(0.5);
        pointer-events: none;
        z-index: 9999;
      `;
      document.body.appendChild(ripple);
      ripple.animate([
        { transform: 'translate(-50%, -50%) scale(0.5)', opacity: 1 },
        { transform: 'translate(-50%, -50%) scale(4)', opacity: 0 }
      ], { duration: 600, easing: 'ease-out' }).onfinish = () => ripple.remove();
    }

    function setupMusic() {
      const music = document.getElementById("bgMusic");
      const btn = document.getElementById("musicBtn");

      const tryAutoPlay = () => {
        music.volume = 0.45;
        music.play().then(() => {
          btn.textContent = "⏸ Pause Music";
          btn.classList.add("playing");
        }).catch(() => {
          btn.textContent = "🎵 Play Music";
        });
      };

      tryAutoPlay();

      btn.addEventListener("click", () => {
        if (music.paused) {
          music.play();
          btn.textContent = "⏸ Pause Music";
          btn.classList.add("playing");
        } else {
          music.pause();
          btn.textContent = "🎵 Play Music";
          btn.classList.remove("playing");
        }
      });

      document.addEventListener("click", () => {
        if (music.paused) tryAutoPlay();
      }, { once: true });
    }

    function setupBlowEffect() {
      const candles = document.querySelectorAll(".candle");

      candles.forEach(candle => {
        candle.addEventListener("click", () => blowCandle(candle));
      });

      // Press B -> blow all candles
      window.addEventListener("keydown", (e) => {
        if (e.key.toLowerCase() === "b") {
          candles.forEach(c => blowCandle(c));
        }
      });
    }

    function blowCandle(candle) {
      if (candle.classList.contains("blown")) return;
      candle.classList.add("blown");

      for (let i = 0; i < 6; i++) {
        const smoke = document.createElement("div");
        smoke.className = "smoke";
        smoke.style.left = `calc(50% + ${Math.random() * 20 - 10}px)`;
        smoke.style.animationDelay = `${i * 0.12}s`;
        candle.appendChild(smoke);
        setTimeout(() => smoke.remove(), 2000);
      }

      heartBurst();
      miniConfettiBurst();

      // Create wind ripple at candle center
      const rect = candle.getBoundingClientRect();
      createWindRipple(rect.left + rect.width / 2, rect.top + 30);

      const remaining = document.querySelectorAll(".candle:not(.blown)").length;
      const sub = document.querySelector(".sub");
      if (sub) {
        sub.textContent = remaining === 0
          ? "All candles blown 🎉 Happy Birthdayy ✨❤️"
          : `Candles left: ${remaining} 🕯️`;
      }
      if (remaining === 0) {
        showFinalCelebration();
      }
    }

    function startFloatingHearts() {
      const container = document.getElementById("hearts-container");

      setInterval(() => {
        const heart = document.createElement("div");
        heart.className = "heart";

        const size = Math.random() * 18 + 12;
        const left = Math.random() * 100;
        const duration = Math.random() * 4 + 5;

        heart.style.cssText = `
          position:absolute;
          bottom:-40px;
          left:${left}vw;
          width:${size}px;
          height:${size}px;
          transform: rotate(45deg);
          opacity:${Math.random() * 0.6 + 0.3};
          animation: heartFloat ${duration}s linear forwards;
          filter: drop-shadow(0 8px 12px rgba(0,0,0,0.2));
          background: rgba(255, 77, 109, 0.85);
          border-radius: 4px;
        `;

        heart.innerHTML = `<span></span><span></span>`;
        container.appendChild(heart);
        setTimeout(() => heart.remove(), duration * 1000);
      }, 350);

      if (!document.getElementById("heart-styles")) {
        const style = document.createElement("style");
        style.id = "heart-styles";
        style.innerHTML = `
          .heart span{
            position:absolute;
            width:100%;
            height:100%;
            background: inherit;
            border-radius: 50%;
          }
          .heart span:first-child{ top:-50%; left:0; }
          .heart span:last-child{ left:-50%; top:0; }

          @keyframes heartFloat{
            0%{ transform: translateY(0) rotate(45deg) scale(0.9); }
            100%{ transform: translateY(-120vh) rotate(45deg) scale(1.2); }
          }
        `;
        document.head.appendChild(style);
      }
    }

    function startCakeSparkles() {
      const container = document.getElementById("cakeWrap");
      const sparkleColors = ['#ffffff', '#ffe066', '#fff5f8', '#ff8fa8', '#ffc9dd', '#4cc9f0'];

      setInterval(() => {
        const sparkle = document.createElement("div");
        const size = Math.random() * 6 + 3;
        const color = sparkleColors[Math.floor(Math.random() * sparkleColors.length)];

        sparkle.className = "cake-sparkle";
        sparkle.style.cssText = `
          left: ${Math.random() * 68 + 16}%;
          top: ${Math.random() * 32 + 8}%;
          width: ${size}px;
          height: ${size}px;
          background: radial-gradient(circle, ${color} 0%, rgba(255,255,255,0) 70%);
          box-shadow: 0 0 ${size * 3}px ${color};
          opacity: 0;
          filter: blur(0.4px);
          animation: sparkleTwinkle ${0.9 + Math.random() * 0.7}s cubic-bezier(0.4, 0, 0.2, 1) forwards;
          transform: scale(0.6);
        `;
        container.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 1800);
      }, 280);

      // Occasional big sparkle shower
      setInterval(() => {
        for (let i = 0; i < 6; i++) {
          setTimeout(() => {
            const sparkle = document.createElement("div");
            const size = Math.random() * 9 + 5;
            const color = sparkleColors[Math.floor(Math.random() * sparkleColors.length)];

            sparkle.className = "cake-sparkle";
            sparkle.style.cssText = `
              left: ${Math.random() * 75 + 12}%;
              top: ${Math.random() * 40 + 5}%;
              width: ${size}px;
              height: ${size}px;
              background: radial-gradient(circle, ${color} 0%, rgba(255,255,255,0) 70%);
              box-shadow: 0 0 ${size * 4}px ${color};
              opacity: 0;
              filter: blur(0.5px);
              animation: sparkleTwinkle 1.2s ease-out forwards;
              transform: scale(0.5);
            `;
            container.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 1400);
          }, i * 120);
        }
      }, 3500);
    }

    function showFinalCelebration() {
      if (finalCelebrationShown) return;
      finalCelebrationShown = true;

      // Screen flash effect
      const flash = document.createElement('div');
      flash.style.cssText = `
        position: fixed;
        inset: 0;
        background: radial-gradient(ellipse at center, rgba(255,215,0,0.4) 0%, rgba(255,77,109,0.3) 50%, transparent 100%);
        z-index: 10004;
        pointer-events: none;
        animation: flashFade 0.8s ease-out forwards;
      `;
      document.body.appendChild(flash);
      setTimeout(() => flash.remove(), 800);

      const overlay = document.createElement("div");
      overlay.id = "celebrationOverlay";
      overlay.className = "celebration-overlay";

      const row = document.createElement("div");
      row.className = "drop-image-row";
      ["image1.png", "image2.png", "image3.png", "image4.png"].forEach((src, index) => {
        const img = document.createElement("img");
        img.src = src;
        img.alt = `Birthday image ${index + 1}`;
        img.className = "drop-image";
        img.style.animationDelay = `${0.1 + index * 0.15}s`;
        row.appendChild(img);
      });
      overlay.appendChild(row);

      // Add the final message after images drop in
      setTimeout(() => {
        const message = document.createElement("div");
        message.id = "finalMessage";
        message.className = "final-message";
        message.innerHTML = `
          <h2>🎉 Happy Birthday Sushmaaa🐼 🎂</h2>
          <p>All candles are out — now the surprise begins with gifts, music, and lots of love. You deserve all the happiness today and always!</p>
        `;
        overlay.appendChild(message);
      }, 1500);

      document.body.appendChild(overlay);

      createPopBurst(25, overlay);
      setTimeout(() => createPopBurst(22, overlay), 220);
      setTimeout(() => createPopBurst(18, overlay), 440);
      sparkleBurst();
      confettiCannon();
      startConfetti();
      heartBurst();
      miniConfettiBurst();
    }

    // Background confetti layer
    function startBackgroundConfetti() {
      const container = document.getElementById("confetti-bg");
      if (!container) return;

      const colors = ["#ff4d6d", "#ff8fab", "#ffd166", "#06d6a0", "#4cc9f0", "#c77dff", "#ffffff"];
      const count = 50;

      for (let i = 0; i < count; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti-bg-piece";
        const size = Math.random() * 8 + 4;
        const left = Math.random() * 100;
        const delay = Math.random() * 8;
        const duration = 6 + Math.random() * 4;
        const color = colors[Math.floor(Math.random() * colors.length)];

        piece.style.cssText = `
          left: ${left}%;
          width: ${size}px;
          height: ${size}px;
          background: ${color};
          border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
          animation-delay: ${delay}s;
          animation-duration: ${duration}s;
        `;
        container.appendChild(piece);
      }
    }

    // Gallery modal
    function setupGallery() {
      const btn = document.getElementById("galleryBtn");
      const images = [
        { src: "image1.png", alt: "Memory 1" },
        { src: "image2.png", alt: "Memory 2" },
        { src: "image3.png", alt: "Memory 3" },
        { src: "image4.png", alt: "Memory 4" }
      ];

      btn.addEventListener("click", () => {
        const overlay = document.createElement("div");
        overlay.id = "galleryOverlay";
        overlay.className = "gallery-overlay";
        overlay.innerHTML = `
          <div class="gallery-close">&times;</div>
          <div class="gallery-title">🎂 Memories of Sushmaaa 🐼</div>
          <div class="gallery-grid">
            ${images.map((img, i) => `
              <div class="gallery-item" style="animation-delay: ${i * 0.1}s">
                <img src="${img.src}" alt="${img.alt}" />
              </div>
            `).join('')}
          </div>
        `;
        document.body.appendChild(overlay);
        document.body.style.overflow = 'hidden';

        overlay.querySelector('.gallery-close').addEventListener('click', () => {
          overlay.remove();
          document.body.style.overflow = '';
        });
        overlay.addEventListener('click', (e) => {
          if (e.target === overlay) {
            overlay.remove();
            document.body.style.overflow = '';
          }
        });

        // Add styles inline to ensure they load
        if (!document.getElementById('gallery-styles')) {
          const style = document.createElement('style');
          style.id = 'gallery-styles';
          style.innerHTML = `
            .gallery-overlay{
              position:fixed; inset:0;
              background:rgba(0,0,0,0.85);
              z-index:20000;
              display:flex;
              flex-direction:column;
              align-items:center;
              justify-content:center;
              padding:20px;
              animation: fadeIn 0.3s ease;
            }
            @keyframes fadeIn{ from{opacity:0} to{opacity:1} }
            .gallery-close{
              position:absolute; top:20px; right:30px;
              font-size:3rem; color:white; cursor:pointer;
              transition:transform 0.2s; line-height:1;
            }
            .gallery-close:hover{ transform:scale(1.3) rotate(90deg); }
            .gallery-title{
              font-family:"Great Vibes",cursive;
              font-size:2.6rem;
              color:white;
              margin-bottom:30px;
              text-align:center;
              text-shadow:0 0 30px rgba(255,77,109,0.8);
              animation: textFloat 4s ease-in-out infinite;
            }
            .gallery-grid{
              display:grid;
              grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
              gap:24px;
              max-width:900px;
              width:100%;
              padding:0 20px;
            }
            .gallery-item{
              border-radius:24px;
              overflow:hidden;
              border:4px solid rgba(255,255,255,0.2);
              box-shadow:0 20px 50px rgba(0,0,0,0.5);
              animation: zoomIn 0.5s cubic-bezier(0.22,0.95,0.58,1) backwards;
              transition:transform 0.3s ease, box-shadow 0.3s ease;
              aspect-ratio:1;
              background:rgba(255,255,255,0.05);
            }
            @keyframes zoomIn{
              from{ opacity:0; transform:scale(0.6) translateY(30px); }
              to{ opacity:1; transform:scale(1) translateY(0); }
            }
            .gallery-item:hover{
              transform:scale(1.04);
              box-shadow:0 25px 60px rgba(0,0,0,0.6),0 0 40px rgba(255,77,109,0.3);
            }
            .gallery-item img{
              width:100%; height:100%;
              object-fit:cover;
              display:block;
            }
            @media(max-width:600px){
              .gallery-grid{ grid-template-columns:1fr; }
              .gallery-title{ font-size:2rem; }
            }
          `;
          document.head.appendChild(style);
        }
      });
    }

    window.addEventListener("load", () => {
      createStars();
      createBalloons();
      startBackgroundConfetti();
      startFloatingHearts();
      startCakeSparkles();
      setupGallery();

      setTimeout(() => {
        startConfetti();
      }, 2500);

      setupMusic();
      setupBlowEffect();
    });
    function addFlashAnimation() {
      if (!document.getElementById('flash-style')) {
        const style = document.createElement('style');
        style.id = 'flash-style';
        style.innerHTML = `
          @keyframes flashFade{
            0%{ opacity:1; }
            100%{ opacity:0; }
          }
        `;
        document.head.appendChild(style);
      }
    }
    addFlashAnimation();

    // Confetti cannon effect
    function confettiCannon() {
      const container = document.getElementById("confetti-container");
      const colors = ["#ff4d6d", "#ffd166", "#06d6a0", "#4cc9f0", "#c77dff", "#ffffff", "#ff9f43"];

      for (let j = 0; j < 5; j++) {
        setTimeout(() => {
          const baseX = 30 + j * 10;
          for (let i = 0; i < 18; i++) {
            const piece = document.createElement("div");
            const size = Math.random() * 8 + 4;
            const vx = (Math.random() - 0.3) * 400;
            const vy = -(Math.random() * 300 + 200);
            const angle = Math.random() * 360;

            piece.style.cssText = `
              position:absolute;
              bottom: 40vh;
              left: ${baseX}vw;
              width:${size}px;
              height:${size}px;
              background:${colors[Math.floor(Math.random() * colors.length)]};
              border-radius:${Math.random()>0.5?'50%':'2px'};
              transform: rotate(${angle}deg);
            `;
            piece.style.setProperty('--tx', `${vx}px`);
            piece.style.setProperty('--ty', `${vy}px`);

            container.appendChild(piece);

            const anim = piece.animate([
              { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
              { transform: `translate(calc(var(--tx) * 0.3), calc(var(--ty) * 0.3)) rotate(${angle * 2}deg)`, opacity: 0.8 },
              { transform: `translate(var(--tx), var(--ty)) rotate(${angle * 3}deg)`, opacity: 0 }
            ], { duration: 1200 + Math.random() * 600, easing: 'cubic-bezier(0.25,0.46,0.45,0.94)' });

            anim.onfinish = () => piece.remove();
          }
        }, j * 200);
      }
    }

    // Sparkle burst effect
    function sparkleBurst() {
      const colors = ['#ffffff', '#ffe066', '#ffc9dd', '#4cc9f0', '#06d6a0'];
      const count = 40;

      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          const sparkle = document.createElement('div');
          const angle = (Math.random() * Math.PI * 2);
          const velocity = 200 + Math.random() * 200;
          const x = Math.cos(angle) * 60;
          const y = Math.sin(angle) * 60;
          const size = Math.random() * 5 + 3;
          const color = colors[Math.floor(Math.random() * colors.length)];

          sparkle.style.cssText = `
            position: absolute;
            left: 50%;
            top: 40%;
            width: ${size}px;
            height: ${size}px;
            background: ${color};
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 ${size * 3}px ${color};
            z-index: 10006;
          `;

          document.body.appendChild(sparkle);

          const anim = sparkle.animate([
            { transform: 'translate(-50%, -40%) scale(0.5)', opacity: 1 },
            { transform: `translate(calc(-50% + ${x}px), calc(-40% + ${y}px)) scale(1.2)`, opacity: 0 }
          ], { duration: 800 + Math.random() * 400, easing: 'ease-out' });

          anim.onfinish = () => sparkle.remove();
        }, i * 30);
      }
    }

    function createPopBurst(count, container) {
      for (let i = 0; i < count; i++) {
        const dot = document.createElement("div");
        dot.className = "pop-dot";
        const dx = (Math.random() - 0.5) * 260;
        const dy = (Math.random() - 0.5) * 180 - 60;
        dot.style.setProperty("--dx", `${dx}px`);
        dot.style.setProperty("--dy", `${dy}px`);
        dot.style.left = `calc(50% + ${Math.random() * 120 - 60}px)`;
        dot.style.top = `calc(40% + ${Math.random() * 30 - 15}px)`;
        container.appendChild(dot);
        setTimeout(() => dot.remove(), 900);
      }
    }

    function heartBurst() {
      const container = document.getElementById("hearts-container");
      const heartsColors = [
        'rgba(255, 77, 109, 0.9)',
        'rgba(255, 143, 171, 0.85)',
        'rgba(255, 209, 102, 0.85)',
        'rgba(76, 201, 240, 0.85)',
        'rgba(199, 125, 255, 0.85)'
      ];

      for (let i = 0; i < 30; i++) {
        const heart = document.createElement("div");
        const size = Math.random() * 18 + 8;
        const color = heartsColors[Math.floor(Math.random() * heartsColors.length)];

        heart.style.cssText = `
          position:absolute;
          top: 35vh;
          left: 50vw;
          width:${size}px;
          height:${size}px;
          transform: rotate(45deg);
          opacity:1;
          animation: burstHeart ${1.8 + Math.random() * 0.8}s ease-out forwards;
          background: ${color};
          border-radius: 4px;
        `;
        heart.innerHTML = `<span></span><span></span>`;

        const x = (Math.random() - 0.5) * 650;
        const y = (Math.random() - 0.5) * 650;

        const duration = 1.8 + Math.random() * 0.8;
        heart.style.setProperty("--x", `${x}px`);
        heart.style.setProperty("--y", `${y}px`);
        heart.style.animationDelay = `-${Math.random() * duration}s`;

        container.appendChild(heart);
        setTimeout(() => heart.remove(), 3000);
      }

      if (!document.getElementById("burst-heart-style")) {
        const style = document.createElement("style");
        style.id = "burst-heart-style";
        style.innerHTML = `
          @keyframes burstHeart{
            0%{ transform: translate(0,0) rotate(45deg) scale(1); opacity:1; }
            100%{ transform: translate(var(--x), var(--y)) rotate(45deg) scale(0.3); opacity:0; }
          }
        `;
        document.head.appendChild(style);
      }
    }

    function startConfetti() {
      const container = document.getElementById("confetti-container");
      container.innerHTML = "";

      const colors = ["#ff4d6d", "#ff8fab", "#ffd166", "#06d6a0", "#4cc9f0", "#c77dff", "#ffffff", "#ff9f43"];
      const confettiCount = 260;

      for (let i = 0; i < confettiCount; i++) {
        const piece = document.createElement("div");
        const size = Math.random() * 12 + 4;
        const delay = Math.random() * 5;
        const duration = Math.random() * 3 + 4;
        const left = Math.random() * 100;
        const shape = Math.random();
        const borderRadius = shape < 0.33 ? "50%" : shape < 0.66 ? "2px" : "0";
        const rotation = Math.random() * 360;

        piece.style.cssText = `
          position:absolute;
          top:-30px;
          left:${left}vw;
          width:${size}px;
          height:${size * (0.6 + Math.random() * 0.8)}px;
          background:${colors[Math.floor(Math.random() * colors.length)]};
          opacity:${Math.random() * 0.6 + 0.4};
          border-radius:${borderRadius};
          transform: rotate(${rotation}deg);
          animation: confettiFall ${duration}s linear ${delay}s infinite;
        `;
        container.appendChild(piece);
      }

      if (!document.getElementById("confetti-styles")) {
        const style = document.createElement("style");
        style.id = "confetti-styles";
        style.innerHTML = `
          @keyframes confettiFall{
            0%{ transform: translateY(0) rotate(0deg); opacity:1; }
            100%{ transform: translateY(115vh) rotate(720deg); opacity:0; }
          }
        `;
        document.head.appendChild(style);
      }
    }

    function miniConfettiBurst() {
      const container = document.getElementById("confetti-container");

      for (let i = 0; i < 70; i++) {
        const dot = document.createElement("div");
        const size = Math.random() * 7 + 4;

        dot.style.cssText = `
          position:absolute;
          top: 38vh;
          left: 50vw;
          width:${size}px;
          height:${size}px;
          background: rgba(255,255,255,0.9);
          border-radius:50%;
          animation: burstConfetti 1.8s ease-out forwards;
        `;

        const x = (Math.random() - 0.5) * 600;
        const y = (Math.random() - 0.5) * 450;
        dot.style.setProperty("--x", `${x}px`);
        dot.style.setProperty("--y", `${y}px`);

        container.appendChild(dot);
        setTimeout(() => dot.remove(), 2000);
      }

      if (!document.getElementById("burst-confetti-style")) {
        const style = document.createElement("style");
        style.id = "burst-confetti-style";
        style.innerHTML = `
          @keyframes burstConfetti{
            0%{ transform: translate(0,0) scale(1); opacity:1; }
            100%{ transform: translate(var(--x), var(--y)) scale(0.2); opacity:0; }
          }
        `;
        document.head.appendChild(style);
      }
    }

    /* Stars background generator */
    function createStars() {
      const container = document.getElementById('stars-layer');
      const starCount = 60;

      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';

        const size = Math.random() * 3 + 1;
        const left = Math.random() * 100;
        const top = Math.random() * 100;
        const duration = Math.random() * 2 + 1.5;

        star.style.cssText = `
          left: ${left}%;
          top: ${top}%;
          width: ${size}px;
          height: ${size}px;
          --duration: ${duration}s;
          animation-delay: ${Math.random() * 3}s;
          background: white;
          box-shadow: 0 0 ${size * 2}px rgba(255,255,255,0.7);
        `;

        container.appendChild(star);
      }
    }

    /* Balloons generator */
    function createBalloons() {
      const container = document.getElementById('balloons-layer');
      balloonData.forEach((b, i) => {
        const balloon = document.createElement('div');
        balloon.innerHTML = `<svg viewBox="0 0 60 90" width="${b.size}" height="${b.size * 1.5}"><defs><radialGradient id="grad${i}" cx="30%" cy="30%" r="70%"><stop offset="0%" stop-color="white"/><stop offset="100%" stop-color="${b.color}"/></radialGradient></defs><path d="M30 0 C10 0 0 15 0 35 C0 60 30 90 30 90 C30 90 60 60 60 35 C60 15 50 0 30 0" fill="url(#grad${i})"/><path d="M25 85 Q30 95 35 85" stroke="${b.color}" stroke-width="2" fill="none"/></svg>`;

        balloon.className = 'balloon';
        balloon.style.cssText = `
          left: ${b.left}%;
          top: ${b.top}%;
          width: ${b.size}px;
          height: ${b.size * 1.5}px;
          animation-delay: ${b.delay}s;
          transform: rotate(-5deg);
        `;

        container.appendChild(balloon);
      });
    }

    const balloonData = [
      { left: 8, top: 5, size: 50, color: '#ff4d6d', delay: 0 },
      { left: 88, top: 8, size: 55, color: '#4cc9f0', delay: 0.5 },
      { left: 4, top: 70, size: 45, color: '#ffd166', delay: -1 },
      { left: 92, top: 75, size: 48, color: '#06d6a0', delay: -0.3 },
      { left: 20, top: 2, size: 40, color: '#c77dff', delay: 0.8 },
      { left: 78, top: 12, size: 42, color: '#ff8fab', delay: -0.7 },
    ];
  </script>
</body>
